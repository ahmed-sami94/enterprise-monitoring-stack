global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: telegraf-linux
    static_configs:
      - targets:
          - "192.168.1.21:9273"
          - "192.168.1.22:9273"
        labels:
          env: production
          role: linux-vm

  - job_name: telegraf-windows
    static_configs:
      - targets:
          - "192.168.1.23:9273"
          - "192.168.1.24:9273"
        labels:
          env: production
          role: windows-vm

  - job_name: telegraf-databases
    static_configs:
      - targets:
          - "192.168.1.30:9273"
          - "192.168.1.31:9273"
        labels:
          env: production
          role: database

  - job_name: telegraf-vsphere
    static_configs:
      - targets:
          - "192.168.1.40:9273"
        labels:
          env: production
          role: vsphere-collector
