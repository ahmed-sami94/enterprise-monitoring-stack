[agent]
  interval = "60s"
  hostname = "vsphere-collector-192-168-1-40"

[[outputs.prometheus_client]]
  listen = ":9273"
  path = "/metrics"

[[inputs.vsphere]]
  vcenters = ["https://192.168.1.50/sdk"]
  username = "monitor@vsphere.local"
  password = "CHANGE_ME"
  insecure_skip_verify = true
  force_discover_on_init = true
  host_metric_include = ["cpu.usage.average", "mem.usage.average", "disk.usage.average", "net.usage.average"]
  vm_metric_include = ["cpu.usage.average", "mem.usage.average", "disk.usage.average", "net.usage.average"]
  datastore_metric_include = ["disk.used.latest", "disk.provisioned.latest", "disk.capacity.latest"]
